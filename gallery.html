<!DOCTYPE html>
<html lang="rw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery | Chorale Yacu</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#0b1220;
    color:white;
}

/* HEADER */
header{
    background:#0f1b33;
    padding:20px 50px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

nav a{
    color:white;
    text-decoration:none;
    margin:0 10px;
    font-weight:bold;
}

nav a:hover{
    color:#00ffd5;
}

/* HERO */
.hero{
    text-align:center;
    padding:80px 20px;
    background:linear-gradient(135deg,#0f1b33,#1b2a4a);
}

.hero h1{
    font-size:45px;
    margin-bottom:10px;
}

.hero p{
    color:#b8c2d9;
}

/* GRID */
.container{
    padding:60px 10%;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:15px;
}

/* IMAGE CARD */
.card{
    position:relative;
    overflow:hidden;
    border-radius:15px;
    cursor:pointer;
    box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

.card img{
    width:100%;
    height:250px;
    object-fit:cover;
    transition:0.4s;
}

.card:hover img{
    transform:scale(1.1);
}

/* OVERLAY */
.overlay{
    position:absolute;
    bottom:0;
    left:0;
    right:0;
    background:rgba(0,0,0,0.6);
    padding:10px;
    opacity:0;
    transition:0.3s;
}

.card:hover .overlay{
    opacity:1;
}

/* LIGHTBOX */
.lightbox{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
    display:none;
    justify-content:center;
    align-items:center;
}

.lightbox img{
    max-width:90%;
    max-height:80%;
    border-radius:10px;
}

/* FOOTER */
footer{
    text-align:center;
    padding:20px;
    background:#0f1b33;
}

/* MOBILE */
@media(max-width:768px){
    header{
        flex-direction:column;
        text-align:center;
    }
}
</style>

</head>
<body>

<header>
    <h2>CHORALE GALLERY</h2>
    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="members.html">Members</a>
        <a href="events.html">Events</a>
        <a href="music.html">Music</a>
        <a href="gallery.html">Gallery</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>

<!-- HERO -->
<section class="hero">
    <h1>Gallery Yacu</h1>
    <p>Reba amafoto y'ibitaramo n'ibikorwa byacu</p>
</section>

<!-- GALLERY -->
<section class="container">

    <div class="grid">

        <div class="card" onclick="openImg(this)">
            <img src="https://images.unsplash.com/photo-1520975693416-35a3c7a1aeb5?auto=format&fit=crop&w=800&q=80">
            <div class="overlay">Concert Worship</div>
        </div>

        <div class="card" onclick="openImg(this)">
            <img src="https://images.unsplash.com/photo-1520975916090-3105956dac38?auto=format&fit=crop&w=800&q=80">
            <div class="overlay">Choir Practice</div>
        </div>

        <div class="card" onclick="openImg(this)">
            <img src="https://images.unsplash.com/photo-1518609878373-06d740f60d8b?auto=format&fit=crop&w=800&q=80">
            <div class="overlay">Live Performance</div>
        </div>

        <div class="card" onclick="openImg(this)">
            <img src="https://images.unsplash.com/photo-1501386761578-eac5c94b800a?auto=format&fit=crop&w=800&q=80">
            <div class="overlay">Worship Night</div>
        </div>

    </div>

</section>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeImg()">
    <img id="lightboxImg">
</div>

<footer>
    <p>© 2026 Chorale Yacu - Gallery Page</p>
</footer>

<script>
function openImg(card){
    let img = card.querySelector("img").src;
    document.getElementById("lightboxImg").src = img;
    document.getElementById("lightbox").style.display = "flex";
}

function closeImg(){
    document.getElementById("lightbox").style.display = "none";
}
</script>

</body>
</html>
