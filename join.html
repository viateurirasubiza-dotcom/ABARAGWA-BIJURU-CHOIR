<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#0b1220;
    color:white;
}

/* HEADER */
header{
    background:#0f1b33;
    padding:20px 50px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

nav a{
    color:white;
    text-decoration:none;
    margin:0 10px;
    font-weight:bold;
}

nav a:hover{
    color:#00ffd5;
}

/* HERO */
.hero{
    text-align:center;
    padding:80px 20px;
    background:linear-gradient(135deg,#0f1b33,#1b2a4a);
}

.hero h1{
    font-size:45px;
}

.hero p{
    color:#b8c2d9;
}

/* FORM */
.container{
    padding:60px 10%;
    display:flex;
    justify-content:center;
}

.form-box{
    background:#121c33;
    padding:30px;
    border-radius:15px;
    width:100%;
    max-width:500px;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

input, select, textarea{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:8px;
    outline:none;
}

button{
    width:100%;
    padding:12px;
    background:#00ffd5;
    border:none;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#00cbb0;
}

/* WHATSAPP BUTTON */
.whatsapp{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#25D366;
    color:white;
    padding:15px 18px;
    border-radius:50px;
    text-decoration:none;
    font-weight:bold;
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

.whatsapp:hover{
    background:#1ebe5d;
}

/* FOOTER */
footer{
    text-align:center;
    padding:20px;
    background:#0f1b33;
    margin-top:50px;
}

/* MOBILE */
@media(max-width:768px){
    header{
        flex-direction:column;
        text-align:center;
    }
}
</style>

</head>
